<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌸 교토 가족여행 2026</title>

<style>

html,body{height:100%;overflow:hidden;font-family:'Noto Sans KR',sans-serif;background:#f9f4f6;color:#2d1b2e}
.app{display:flex;flex-direction:column;height:100vh}
.topbar{background:#fff;border-bottom:1px solid #e8d5dc;padding:0 16px;display:flex;align-items:center;gap:10px;height:50px;flex-shrink:0;z-index:1000}
.logo{font-size:14px;font-weight:700;white-space:nowrap}.logo span{color:#d4537e}
.nav-tabs{display:flex;gap:3px;margin-left:8px}
.nav-btn{padding:5px 14px;border-radius:20px;border:1px solid #e8d5dc;background:#fff;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;color:#7a6b7b;font-family:inherit;transition:all .15s}
.nav-btn.active{background:#2d1b2e;border-color:#2d1b2e;color:#fff}
.sep{width:1px;height:24px;background:#e8d5dc;margin:0 4px}
.day-tabs{display:flex;gap:3px;overflow-x:auto;flex:1}
.day-tabs::-webkit-scrollbar{display:none}
.tab-btn{padding:5px 11px;border-radius:20px;border:1px solid #e8d5dc;background:#fff;font-size:11px;font-weight:500;cursor:pointer;white-space:nowrap;color:#7a6b7b;font-family:inherit;transition:all .15s}
.tab-btn.active{background:#d4537e;border-color:#d4537e;color:#fff}
.tab-btn:hover:not(.active){background:#fbeaf0;border-color:#f4c0d1;color:#72243e}
.page{display:none;flex:1;overflow:hidden;flex-direction:column}
.page.active{display:flex}

/* SCHEDULE */
.split-wrap{display:flex;flex-direction:column;flex:1;overflow:hidden;position:relative}
.schedule-panel{overflow:hidden;display:flex;flex-direction:column;flex-shrink:0;background:#fff}
.schedule-inner{flex:1;overflow-y:auto;display:flex;min-height:0}
.schedule-inner::-webkit-scrollbar{width:4px}
.schedule-inner::-webkit-scrollbar-thumb{background:#e8d5dc;border-radius:2px}
.drag-handle{height:8px;background:#f0e8ec;border-top:1px solid #e8d5dc;border-bottom:1px solid #e8d5dc;cursor:row-resize;display:flex;align-items:center;justify-content:center;flex-shrink:0;user-select:none;transition:background .15s;z-index:10}
.drag-handle:hover,.drag-handle.dragging{background:#f4c0d1}
.handle-dots{display:flex;gap:3px}
.handle-dots span{width:20px;height:2px;background:#c9a8b5;border-radius:2px}
.map-panel{position:relative;flex:1;min-height:0}
#map{position:absolute;top:0;left:0;width:100%;height:100%}

.day-sidebar{width:280px;flex-shrink:0;border-right:1px solid #e8d5dc;overflow-y:auto;background:#fff}
.day-sidebar::-webkit-scrollbar{width:4px}
.day-sidebar::-webkit-scrollbar-thumb{background:#e8d5dc;border-radius:2px}
.timeline-panel{flex:1;overflow-y:auto;background:#fff}
.timeline-panel::-webkit-scrollbar{width:4px}
.timeline-panel::-webkit-scrollbar-thumb{background:#e8d5dc;border-radius:2px}
.day-hd{padding:12px 14px 8px;border-bottom:1px solid #f0e6ea;position:sticky;top:0;background:#fff;z-index:10}
.day-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;margin-bottom:5px}
.day-title-main{font-size:15px;font-weight:700}
.day-sub{font-size:11px;color:#9a8b9c;margin-top:2px}
.gmap-link{display:flex;align-items:center;gap:5px;margin-top:7px;padding:6px 10px;background:#f9f4f6;border:1px solid #e8d5dc;border-radius:8px;text-decoration:none;color:#2d1b2e;font-size:11px;font-weight:500;transition:all .15s}
.gmap-link:hover{background:#fbeaf0;border-color:#f4c0d1}
.weather-row{padding:7px 14px;display:flex;align-items:center;gap:10px;background:#f9f4f6;border-bottom:1px solid #f0e6ea;font-size:12px}
.outfit-section{padding:10px 14px;border-bottom:1px solid #f0e6ea}
.outfit-title{font-size:10px;font-weight:700;color:#9a8b9c;letter-spacing:.7px;text-transform:uppercase;margin-bottom:6px}
.outfit-item{display:flex;align-items:flex-start;gap:7px;font-size:11px;margin-bottom:4px}
.outfit-icon{font-size:13px;flex-shrink:0;margin-top:1px}
.outfit-text{color:#4a3b4c;line-height:1.4}
.outfit-warn{color:#993556;font-weight:600}
.tl{padding:8px 14px}
.tl-row{display:flex;gap:8px}
.tl-time{font-size:10px;color:#9a8b9c;font-weight:500;width:34px;flex-shrink:0;text-align:right;padding-top:3px}
.tl-mid{display:flex;flex-direction:column;align-items:center;width:16px;flex-shrink:0}
.tl-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:4px;z-index:1}
.tl-seg{width:2px;flex:1;background:#f0e6ea;margin-top:3px;min-height:12px}
.tl-body{flex:1;padding-bottom:10px}
.tl-name{font-size:13px;font-weight:600;line-height:1.4}
.tl-name a{color:inherit;text-decoration:none;border-bottom:1px dashed #d4537e}
.tl-name a:hover{color:#d4537e}
.tl-note{font-size:11px;color:#9a8b9c;margin-top:2px;line-height:1.5}
.tags{display:flex;gap:3px;flex-wrap:wrap;margin-top:4px}
.tag{padding:2px 6px;border-radius:8px;font-size:10px;font-weight:600}
.t-meal{background:#fbeaf0;color:#72243e}.t-sight{background:#e6f1fb;color:#0c447c}
.t-hotel{background:#eaf3de;color:#27500a}.t-move{background:#f1efe8;color:#5f5e5a}
.t-ok{background:#eaf3de;color:#27500a}.t-req{background:#faeeda;color:#633806}
.sec-div{padding:5px 14px;font-size:10px;font-weight:700;color:#9a8b9c;letter-spacing:.8px;text-transform:uppercase;background:#f9f4f6;border-top:1px solid #f0e6ea;border-bottom:1px solid #f0e6ea}
.meal-row{display:flex;gap:8px;padding:6px 14px;border-bottom:1px solid #f9f4f6;font-size:12px}
.meal-type{font-size:10px;font-weight:700;color:#9a8b9c;width:26px;flex-shrink:0;padding-top:1px}
.meal-name{font-weight:600}
.meal-name a{color:#2d1b2e;text-decoration:none;border-bottom:1px dashed #d4537e}
.meal-name a:hover{color:#d4537e}
.meal-menu{color:#9a8b9c;font-size:11px;margin-top:1px}
.meal-st{display:inline-block;margin-top:3px;padding:1px 6px;border-radius:6px;font-size:10px;font-weight:600}
.legend{position:absolute;bottom:12px;right:12px;background:rgba(255,255,255,.96);border:1px solid #e8d5dc;border-radius:10px;padding:8px 12px;z-index:500;font-size:11px;line-height:1.9;pointer-events:none}
.legend-title{font-weight:700;margin-bottom:3px;font-size:12px}
.ldot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px;vertical-align:middle}
.ratio-badge{position:absolute;left:12px;bottom:12px;background:rgba(255,255,255,.9);border:1px solid #e8d5dc;border-radius:8px;padding:4px 10px;font-size:11px;color:#9a8b9c;z-index:500;pointer-events:none}

.rest-page{flex:1;overflow-y:auto;background:#f9f4f6;padding:20px}
.rest-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;max-width:1200px;margin:0 auto}
.rest-card{background:#fff;border:1px solid #e8d5dc;border-radius:14px;overflow:hidden}
.rest-card-head{padding:14px 16px 10px;border-bottom:1px solid #f0e6ea}
.rest-card-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:6px}

.rest-name-en{font-size:11px;color:#9a8b9c;margin-top:2px}
.rest-badges{display:flex;gap:5px;flex-wrap:wrap}
.rest-body{padding:12px 16px}
.rest-row{display:flex;gap:8px;margin-bottom:8px;font-size:12px}
.rest-label{font-size:10px;font-weight:700;color:#9a8b9c;width:40px;flex-shrink:0;padding-top:1px}
.rest-val{flex:1;color:#2d1b2e;line-height:1.5}
.rest-val a{color:#d4537e;text-decoration:none;font-weight:500}
.rest-val a:hover{text-decoration:underline}
.rest-menu-pills{display:flex;gap:5px;flex-wrap:wrap}

.reserve-ok{color:#27500a;background:#eaf3de;padding:1px 7px;border-radius:6px;font-size:10px;font-weight:700}
.reserve-req{color:#633806;background:#faeeda;padding:1px 7px;border-radius:6px;font-size:10px;font-weight:700}
.reserve-no{color:#5f5e5a;background:#f1efe8;padding:1px 7px;border-radius:6px;font-size:10px;font-weight:700}
</style>
</head>

/* ── PAGE SWITCH ── */
function switchPage(p){
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.textContent.includes(p==='schedule'?'일정표':'식당')));
  document.getElementById('dayTabs').style.display=p==='schedule'?'flex':'none';
  if(p==='restaurant') renderRestaurants();
  if(p==='schedule'&&window.gmap) google.maps.event.trigger(window.gmap,'resize');
}

/* ── GOOGLE MAP ── */
let gMarkers=[],gPolyline=null,gInfoWindow=null;

window.initMap=function(){
  window.gmap=new google.maps.Map(document.getElementById('map'),{
    center:{lat:35.01,lng:135.75},zoom:12,
    mapTypeControl:true,streetViewControl:false,fullscreenControl:false
  });
  gInfoWindow=new google.maps.InfoWindow();
  renderMap(DAYS[0]);
  const sw=document.getElementById('splitWrap');
  setH(Math.round(sw.offsetHeight*0.45));
};

function clearMap(){
  gMarkers.forEach(m=>m.setMap(null));gMarkers=[];
  if(gPolyline){gPolyline.setMap(null);gPolyline=null;}
}

function renderMap(day){
  if(!window.gmap) return;
  clearMap();
  const coords=[],seen=new Set();let idx=1;
  day.items.forEach(item=>{
    const k=item.lat+','+item.lng;
    if(!seen.has(k)){
      seen.add(k);
      const pos={lat:item.lat,lng:item.lng};
      coords.push(pos);
      const col=DCOL[item.type]||'#888';
      const marker=new google.maps.Marker({
        position:pos,map:window.gmap,title:item.name,
        label:{text:String(idx),color:'#fff',fontSize:'10px',fontWeight:'700'},
        icon:{path:google.maps.SymbolPath.CIRCLE,scale:13,fillColor:col,fillOpacity:1,strokeColor:'#fff',strokeWeight:2.5}
      });
      marker.addListener('click',()=>{
        gInfoWindow.setContent(`<div style="font-family:'Noto Sans KR',sans-serif;padding:2px 4px"><b style="font-size:13px">${item.name}</b><br><span style="color:#888;font-size:11px">${item.time}${item.note?' · '+item.note:''}</span></div>`);
        gInfoWindow.open(window.gmap,marker);
      });
      gMarkers.push(marker);idx++;
    }
  });
  if(coords.length>1){
    gPolyline=new google.maps.Polyline({path:coords,geodesic:true,strokeColor:day.color,strokeOpacity:0.8,strokeWeight:3,
      icons:[{icon:{path:google.maps.SymbolPath.FORWARD_OPEN_ARROW,scale:2,strokeColor:day.color},offset:'50%',repeat:'80px'}]
    });
    gPolyline.setMap(window.gmap);
  }
  if(coords.length){
    const b=new google.maps.LatLngBounds();
    coords.forEach(c=>b.extend(c));
    window.gmap.fitBounds(b,{top:40,right:40,bottom:40,left:40});
  }
}

/* ── SCHEDULE ── */
function renderSchedule(day){
  const stcls={ok:'t-ok',req:'t-req'};
  const restMap={};RESTAURANTS.forEach(r=>restMap[r.id]=r);
  let sh=`<div class="day-hd">
    <div class="day-badge" style="background:${day.color}1a;color:${day.color};border:1px solid ${day.color}55"><b>${day.n}일차</b><span>${day.date}</span></div>
    <div class="day-title-main">${day.title}</div>
    <div class="day-sub">${day.items.length}개 일정</div>
    <a class="gmap-link" href="${day.gmaps}" target="_blank">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>구글맵 전체 경로
    </a></div>
  <div class="weather-row"><span style="font-size:15px">${day.weather.icon}</span><span style="font-weight:700;font-size:12px">${day.weather.temp}</span><span style="color:#9a8b9c;font-size:11px;margin-left:4px">${day.weather.desc}</span></div>`;
  sh+=`<div class="outfit-section"><div class="outfit-title">추천 의상</div>`;
  day.outfit.forEach(o=>{sh+=`<div class="outfit-item"><span class="outfit-icon">${o.icon}</span><span class="outfit-text${o.warn?' outfit-warn':''}">${o.text}</span></div>`;});
  sh+=`</div><div class="sec-div">식사 요약</div>`;
  day.meals.forEach(m=>{
    const rLink=m.gmaps?`<a href="${m.gmaps}" target="_blank">${m.name}</a>`:m.name;
    sh+=`<div class="meal-row"><div class="meal-type">${m.type}</div><div><div class="meal-name">${rLink}</div>${m.menu?`<div class="meal-menu">${m.menu}</div>`:''} ${m.st?`<span class="meal-st ${stcls[m.st]||''}">${m.stText}</span>`:''}</div></div>`;
  });
  document.getElementById('daySidebar').innerHTML=sh;
  let th=`<div class="tl">`;
  day.items.forEach((item,i)=>{
    const tags=(item.tags||[]).map(t=>`<span class="tag ${TCLS[t]||'t-move'}">${t}</span>`).join('');
    const last=i===day.items.length-1;
    const r=item.restId?restMap[item.restId]:null;
    const nameHtml=r?`<a href="${r.gmaps}" target="_blank">${item.name}</a>`:item.name;
    th+=`<div class="tl-row"><div class="tl-time">${item.time}</div><div class="tl-mid"><div class="tl-dot" style="background:${DCOL[item.type]||'#888'}"></div>${!last?'<div class="tl-seg"></div>':''}</div><div class="tl-body"><div class="tl-name">${nameHtml}</div>${item.note?`<div class="tl-note">${item.note}</div>`:''} ${tags?`<div class="tags">${tags}</div>`:''}</div></div>`;
  });
  th+=`</div>`;
  document.getElementById('timelinePanel').innerHTML=th;
}

/* ── RESTAURANT ── */
function renderRestaurants(){
  const g=document.getElementById('restGrid');
  if(g.children.length>0)return;
  RESTAURANTS.forEach((r,i)=>{
    const menuHtml=r.menu.map((m,mi)=>`<span class="menu-pill${mi===0?' star':''}">${m}</span>`).join('');
    g.innerHTML+=`<div class="rest-card"><div class="rest-card-head"><div class="rest-card-top"><div class="rest-num" style="background:${r.color}">${i+1}</div><div><div class="rest-name">${r.name}</div><div class="rest-name-en">${r.nameEn}</div></div></div><div class="rest-badges"><span class="tag t-meal">${r.meal}</span><span class="tag t-move">${r.day}</span><span class="${r.reserveCls}">${r.reserve}</span></div></div><div class="rest-body"><div class="rest-row"><div class="rest-label">추천메뉴</div><div class="rest-val"><div class="rest-menu-pills">${menuHtml}</div></div></div><div class="rest-row"><div class="rest-label">팁</div><div class="rest-val"><div class="rest-tip">${r.tip}</div></div></div><div class="rest-row"><div class="rest-label">예약</div><div class="rest-val">${r.reserveHow}</div></div><div class="rest-row"><div class="rest-label">전화</div><div class="rest-val">${r.tel!=='-'?`<a href="tel:${r.tel}">${r.tel}</a>`:'-'}</div></div><div class="rest-row"><div class="rest-label">지도</div><div class="rest-val"><a class="rest-gmap" href="${r.gmaps}" target="_blank"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>구글맵에서 보기</a></div></div></div></div>`;
  });
}

/* ── DAY TABS ── */
function switchDay(n){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',+b.dataset.n===n));
  const day=DAYS[n-1];
  renderSchedule(day);
  renderMap(day);
}
const tabsEl=document.getElementById('dayTabs');
DAYS.forEach(d=>{
  const b=document.createElement('button');
  b.className='tab-btn';b.dataset.n=d.n;
  b.textContent=`${d.n}일차 ${d.date}`;
  b.onclick=()=>switchDay(d.n);
  tabsEl.appendChild(b);
});
document.querySelector('.tab-btn').classList.add('active');
renderSchedule(DAYS[0]);

function updateRatio(){
  const wH=splitWrap.offsetHeight,sH=schedulePanel.offsetHeight;
  const mH=wH-dragHandle.offsetHeight-sH;
  ratioBadge.textContent=`일정 ${Math.round(sH/wH*100)}% : 지도 ${Math.round(Math.max(0,mH)/wH*100)}%`;
}
function setH(h){
  const wH=splitWrap.offsetHeight,hH=dragHandle.offsetHeight;
  h=Math.max(80,Math.min(wH-hH-60,h));
  schedulePanel.style.height=h+'px';
  if(window.gmap) google.maps.event.trigger(window.gmap,'resize');
  updateRatio();
}
dragHandle.addEventListener('mousedown',e=>{isDragging=true;startY=e.clientY;startH=schedulePanel.offsetHeight;dragHandle.classList.add('dragging');document.body.style.cssText='cursor:row-resize;user-select:none';});
dragHandle.addEventListener('touchstart',e=>{isDragging=true;startY=e.touches[0].clientY;startH=schedulePanel.offsetHeight;dragHandle.classList.add('dragging');},{passive:true});
document.addEventListener('mousemove',e=>{if(isDragging)setH(startH+(e.clientY-startY));});
document.addEventListener('touchmove',e=>{if(isDragging)setH(startH+(e.touches[0].clientY-startY));},{passive:true});
document.addEventListener('mouseup',()=>{if(!isDragging)return;isDragging=false;dragHandle.classList.remove('dragging');document.body.style.cssText='';});
document.addEventListener('touchend',()=>{isDragging=false;dragHandle.classList.remove('dragging');});
window.addEventListener('resize',()=>{if(window.gmap)google.maps.event.trigger(window.gmap,'resize');updateRatio();});
</script>
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAtZJq7XvSyzuNsVAgp2xps3LraGxiugNc&language=ko&region=JP&callback=initMap" async defer></script>
